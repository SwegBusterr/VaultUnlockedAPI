name: Build NVFolia 26.2

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout helper branch
        uses: actions/checkout@v4

      - name: Checkout NVFolia source
        uses: actions/checkout@v4
        with:
          repository: deivaxxx/NVFolia
          ref: NVFolia/26.2
          path: NVFolia
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Inspect and repair obvious source corruption
        working-directory: NVFolia
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x gradlew
          git config --global user.name 'NVFolia Build Bot'
          git config --global user.email 'nvfolia-build@users.noreply.github.com'
          git rev-parse HEAD | tee ../NVFOLIA_SOURCE_COMMIT.txt

          while IFS= read -r file; do
            echo "Removing corrupted patch: $file"
            rm -f "$file"
          done < <(grep -rl --include='*.patch' '^429: Too Many Requests' . || true)

          sed -i 's/divinemcBuildNumber/nvfoliaBuildNumber/g; s/divinemcChannel/nvfoliaChannel/g' settings.gradle.kts
          sed -i 's/divinemc-api/nvfolia-api/g; s/divinemc-server/nvfolia-server/g' build.gradle.kts

          src='nvfolia-server/src/main/java/org/deivaxxx/nvfolia/NVFoliaVersionFetcher.java'
          if [ -f "$src" ] && grep -q 'public class DivineVersionFetcher' "$src"; then
            mkdir -p nvfolia-server/src/main/java/org/bxteam/divinemc
            mv "$src" nvfolia-server/src/main/java/org/bxteam/divinemc/DivineVersionFetcher.java
          fi

          git diff -- . ':!*.png' | tee ../NVFOLIA_BUILD_REPAIRS.diff

      - name: Apply patches
        id: patches
        continue-on-error: true
        working-directory: NVFolia
        shell: bash
        run: |
          set -o pipefail
          ./gradlew applyAllPatches --stacktrace --no-daemon 2>&1 | tee ../apply-patches.log

      - name: Collect patch diagnostics
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p output/patch-diagnostics
          find NVFolia -type f \( -name 'build.gradle.kts' -o -name '*.rej' -o -name '*.patch' \) \
            -path '*purpur*' -print0 | tar --null -T - -czf output/patch-diagnostics/purpur-build-files.tar.gz || true
          find NVFolia -type f -name '*.rej' -print -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \; \
            | tee output/patch-diagnostics/rejects.txt || true

      - name: Build NVFolia paperclip JAR
        if: steps.patches.outcome == 'success'
        working-directory: NVFolia
        shell: bash
        run: |
          set -o pipefail
          ./gradlew createMojmapPaperclipJar --stacktrace --no-daemon 2>&1 | tee ../build-jar.log

      - name: Collect JAR and checksums
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p output
          find NVFolia -type f -path '*/build/libs/*.jar' -print -exec cp -v {} output/ \; || true
          if compgen -G 'output/*.jar' > /dev/null; then
            sha256sum output/*.jar | tee output/SHA256SUMS.txt
          fi
          cp -f NVFOLIA_SOURCE_COMMIT.txt NVFOLIA_BUILD_REPAIRS.diff apply-patches.log build-jar.log output/ 2>/dev/null || true

      - name: Upload build result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NVFolia-26.2-build
          path: output/
          if-no-files-found: warn
          retention-days: 7
