name: Build NVFolia 26.1.2

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: deivaxxx/NVFolia
          ref: NVFolia/26.1.2
          path: NVFolia
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Configure
        working-directory: NVFolia
        run: |
          chmod +x gradlew
          git config --global user.email actions@users.noreply.github.com
          git config --global user.name 'GitHub Actions'
          mkdir -p divinemc-api divinemc-server
          git rev-parse HEAD > ../SOURCE_COMMIT.txt
      - name: Generate projects
        working-directory: NVFolia
        run: |
          ./gradlew applyAllPatches --stacktrace --no-daemon > ../apply.log 2>&1 || true
          test -s divinemc-api/build.gradle.kts
          test -s divinemc-server/build.gradle.kts
      - name: Repair generated configuration
        working-directory: NVFolia
        run: |
          sed -i 's/project(":purpur-api")/project(":divinemc-api")/g' divinemc-server/build.gradle.kts
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')
          craft = list(root.rglob('org/bukkit/craftbukkit/Main.java'))
          if not craft:
              raise SystemExit('CraftBukkit Main.java was not generated')

          def source_root(path: Path) -> Path:
              marker = Path('org/bukkit/craftbukkit/Main.java')
              return path.parent.parent.parent.parent

          server_roots = sorted({source_root(p).resolve() for p in craft})
          api_roots = sorted({p.parent.parent.parent.parent.resolve() for p in root.rglob('org/bukkit/Bukkit.java')})

          with open('../discovered-source-roots.txt', 'w') as out:
              for p in server_roots:
                  out.write(f'SERVER {p}\n')
              for p in api_roots:
                  out.write(f'API {p}\n')

          with open('divinemc-server/build.gradle.kts', 'a') as f:
              f.write('\nsourceSets {\n    main {\n')
              for p in server_roots:
                  f.write(f'        java.srcDir("{p.as_posix()}")\n')
              f.write('    }\n}\n')

          with open('divinemc-api/build.gradle.kts', 'a') as f:
              f.write('\nsourceSets {\n    main {\n')
              for p in api_roots:
                  f.write(f'        java.srcDir("{p.as_posix()}")\n')
              f.write('    }\n}\n')
          PY
          cat ../discovered-source-roots.txt
      - name: Build
        working-directory: NVFolia
        run: |
          ./gradlew :divinemc-server:tasks --all --no-daemon > ../tasks.log 2>&1
          task=$(grep -E '^create[A-Za-z0-9]*PaperclipJar\b' ../tasks.log | awk '{print $1}' | head -n1)
          test -n "$task"
          echo "$task" > ../selected-task.txt
          ./gradlew ":divinemc-server:$task" --stacktrace --no-daemon > ../build.log 2>&1
      - name: Validate runtime
        working-directory: NVFolia
        run: |
          mkdir -p ../output
          jar=$(find divinemc-server/build/libs -type f -name '*paperclip*.jar' | head -n1)
          test -n "$jar"
          cp "$jar" ../output/NVFolia-26.1.2.jar
          unzip -t ../output/NVFolia-26.1.2.jar
          rm -rf cache
          java -Dpaperclip.patchonly=true -jar ../output/NVFolia-26.1.2.jar
          runtime=$(find cache -type f -name '*.jar' -size +1M | head -n1)
          test -n "$runtime"
          unzip -l "$runtime" | grep -q 'org/bukkit/craftbukkit/Main.class'
          sha256sum ../output/NVFolia-26.1.2.jar > ../output/SHA256SUMS.txt
          strings ../output/NVFolia-26.1.2.jar | grep -Eai 'discord(app)?\.com/api/webhooks|pastebin|ngrok|Runtime\.getRuntime|ProcessBuilder|/bin/(ba)?sh|powershell|cmd\.exe' > ../output/suspicious-strings.txt || true
          cp ../SOURCE_COMMIT.txt ../discovered-source-roots.txt ../selected-task.txt ../build.log ../output/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NVFolia-26.1.2-runtime-validated
          path: output/
          if-no-files-found: warn
          retention-days: 7
